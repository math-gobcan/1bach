<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios de Límites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .math-table td { padding: 15px 8px; border: 1px solid #e2e8f0; }
        .math-table th { background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; }
        #capture-area { background: white; padding: 40px; border-radius: 8px; }
        /* Forzar que el límite se vea debajo */
        .mjx-chtml.MJXc-display { margin: 0.5em 0 !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-bold text-gray-800">Vista Previa de Ejercicios</h1>
            <button onclick="downloadImage()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
                Descargar Imagen para Alumnos
            </button>
        </div>

        <!-- Área que se convertirá en imagen -->
        <div id="capture-area" class="shadow-xl">
            <div class="text-center mb-6">
                <h2 class="text-4xl font-extrabold text-blue-900 mb-2 uppercase tracking-wider">Ejercicios de Límites</h2>
                <p class="text-gray-500 italic">Práctica integral: Propiedades e Indeterminaciones</p>
                <div class="h-1 w-32 bg-blue-500 mx-auto mt-4"></div>
            </div>

            <table class="w-full math-table text-center text-sm md:text-base border-collapse">
                <thead>
                    <tr>
                        <th class="w-12">N°</th>
                        <th>Ejercicio</th>
                        <th class="w-12 border-l-2">N°</th>
                        <th>Ejercicio</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Los ejercicios se insertan aquí vía JS -->
                </tbody>
            </table>
            
            <div class="mt-8 text-right text-gray-400 text-xs">
                Material de apoyo pedagógico - Matemáticas
            </div>
        </div>
    </div>

    <script>
        const ejercicios = [
            "\\lim_{x \\to 5} 7", "\\lim_{x \\to \\infty} \\frac{3x^2 - 5x + 1}{2x^2 + 4}",
            "\\lim_{x \\to 2} 4x^3", "\\lim_{x \\to \\infty} \\frac{7x^3 + 2}{4x^3 - x^2}",
            "\\lim_{x \\to 1} (3x^2 + 5x)", "\\lim_{x \\to \\infty} \\frac{5x^2 + 1}{x^3 - 2x}",
            "\\lim_{x \\to -2} (x^3 - 4x)", "\\lim_{x \\to \\infty} \\frac{x^4 - 3x}{2x^2 + x}",
            "\\lim_{x \\to 3} (x^2(x-1))", "\\lim_{x \\to \\infty} \\frac{\\sqrt{4x^2 + 1}}{3x - 2}",
            "\\lim_{x \\to 2} \\frac{x^2 + 1}{x + 2}", "\\lim_{x \\to \\infty} \\frac{\\sqrt[3]{8x^3 + 5}}{2x + 1}",
            "\\lim_{x \\to 8} \\sqrt[3]{x^2}", "\\lim_{x \\to \\infty} \\frac{8x^4 - 3x^2 + 1}{2x^4 + 5}",
            "\\lim_{x \\to e^2} \\ln(x)", "\\lim_{x \\to \\infty} \\frac{\\sqrt{9x^2+1} + x}{3x + 2}",
            "\\lim_{x \\to 100} \\log(x^3)", "\\lim_{x \\to -\\infty} \\frac{5x^3 - 2}{3x^3 + 4x}",
            "\\lim_{x \\to 3} 2^{x-1}", "\\lim_{x \\to \\infty} \\frac{10x^2 - 1}{5x^2 + x}",
            "\\lim_{x \\to 1} (x^2 + x + 1)", "\\lim_{x \\to \\infty} (\\sqrt{x^2 + x} - x)",
            "\\lim_{x \\to 4} (\\sqrt{x} + 3x)", "\\lim_{x \\to \\infty} (\\sqrt{x^2 + 4x} - \\sqrt{x^2 - 4x})",
            "\\lim_{x \\to 0} \\frac{e^x}{x+1}", "\\lim_{x \\to \\infty} (\\sqrt{x^2 + 1} - x)",
            "\\lim_{x \\to 2} \\sqrt{x+2}", "\\lim_{x \\to 1} \\left(\\frac{1}{x-1} - \\frac{2}{x^2-1}\\right)",
            "\\lim_{x \\to 1} \\frac{\\sqrt{x+3}}{x^2+1}", "\\lim_{x \\to 2} \\left(\\frac{4}{x^2-4} - \\frac{1}{x-2}\\right)",
            "\\lim_{x \\to 2} \\frac{x^2 - 4}{x - 2}", "\\lim_{x \\to \\infty} (\\sqrt{x^2 + 2x} - \\sqrt{x^2 - x})",
            "\\lim_{x \\to 3} \\frac{x^2 - 9}{x^2 - 3x}", "\\lim_{x \\to \\infty} \\frac{x^2 + x}{3x^2 - 5}",
            "\\lim_{x \\to -1} \\frac{x^2 + 3x + 2}{x + 1}", "\\lim_{x \\to \\infty} (2x^3 - 10x^2)",
            "\\lim_{x \\to 1} \\frac{x^3 - 1}{x - 1}", "\\lim_{x \\to \\infty} \\left(1 + \\frac{1}{x}\\right)^x",
            "\\lim_{x \\to 0} \\frac{3x^3 + 2x^2}{5x^2 - 4x}", "\\lim_{x \\to \\infty} \\left(1 + \\frac{3}{x}\\right)^{2x}",
            "\\lim_{x \\to 4} \\frac{\\sqrt{x} - 2}{x - 4}", "\\lim_{x \\to \\infty} \\left(1 - \\frac{2}{x}\\right)^x",
            "\\lim_{x \\to 1} \\frac{\\sqrt{x+3} - 2}{x - 1}", "\\lim_{x \\to 0} (1 + x)^{\\frac{1}{x}}",
            "\\lim_{x \\to 5} \\frac{x^2 - 25}{x - 5}", "\\lim_{x \\to \\infty} \\left(\\frac{x+2}{x+1}\\right)^x",
            "\\lim_{x \\to 1} \\frac{\\sqrt{x} - 1}{\\sqrt{x+3} - 2}", "\\lim_{x \\to \\infty} \\left(\\frac{2x-1}{2x+3}\\right)^{3x}",
            "\\lim_{x \\to 2} \\frac{x^3 - 8}{x - 2}", "\\lim_{x \\to \\infty} \\left(\\frac{3x+5}{3x-2}\\right)^{4x}"
        ];

        function populateTable() {
            const tbody = document.getElementById('table-body');
            for (let i = 0; i < 25; i++) {
                const tr = document.createElement('tr');
                
                // Columna Izquierda
                const td1 = document.createElement('td');
                td1.className = "font-bold text-blue-700 bg-blue-50/30";
                td1.innerText = i + 1;
                const td2 = document.createElement('td');
                td2.innerHTML = `$$\\displaystyle ${ejercicios[i*2]}$$`;
                
                // Columna Derecha
                const td3 = document.createElement('td');
                td3.className = "font-bold text-blue-700 bg-blue-50/30 border-l-2";
                td3.innerText = i + 26;
                const td4 = document.createElement('td');
                td4.innerHTML = `$$\\displaystyle ${ejercicios[i*2+1]}$$`;
                
                tr.appendChild(td1);
                tr.appendChild(td2);
                tr.appendChild(td3);
                tr.appendChild(td4);
                tbody.appendChild(tr);
            }
            
            // Re-procesar MathJax después de insertar contenido dinámico
            if (window.MathJax && window.MathJax.typeset) {
                window.MathJax.typeset();
            }
        }

        window.onload = populateTable;

        function downloadImage() {
            const element = document.getElementById('capture-area');
            html2canvas(element, {
                scale: 2,
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Ejercicios_de_Limites.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
